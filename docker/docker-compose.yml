# Self-hosted save server for Game Save Genie (MinIO, S3-compatible).
#
#   cp .env.example .env   # then edit the credentials
#   docker compose up -d
#
# Point gsg at it from any machine:
#   gsg setup-s3 homelab
#     endpoint:   http://<server-ip>:9000
#     access key: (MINIO_ROOT_USER, or a per-user key — see README.md)
#     secret key: (MINIO_ROOT_PASSWORD / per-user secret)
#     bucket:     game-saves
#
# The MinIO web console runs on port 9001 for managing users and buckets.

services:
  minio:
    image: minio/minio:latest
    container_name: gsg-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "9000:9000"   # S3 API — gsg talks to this
      - "9001:9001"   # Web console
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: creates the default bucket, then exits.
  init-bucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set gsg http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" &&
      mc mb --ignore-existing gsg/game-saves &&
      echo 'Bucket game-saves ready.'
      "
